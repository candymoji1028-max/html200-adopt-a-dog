<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt A Dog</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
  </head>
  <body class="contact-page">
    <!--Header-->
    <header class="site-header">
   
      <div class="logo">
        <img src="images/adoptadog-logo.svg" alt="Adoptadog logo" class="logo-img">
        <p> Seattle's premiere dog adoption agency</p>
      </div>

      <div class="cart">
        <div class="cart-top">
          <img src="images/cart-icon.svg" alt="" class="cart-icon">
          <span>$1234.56</span>
        </div>

        <a class="checkout-btn" href="checkout.html" >Checkout</a>
      </div>
    </header>

    <!--Navigation-->
    <nav class="header-nav">
      <ul class="header-nav-ul">
        <li><a class="header-nav-a" href="index.html">Home</a></li>
        <li><a class="header-nav-a" href="dogs.html">Dogs</a></li>
        <li><a class="header-nav-a" href="blog.html">Blog</a></li>
      </ul>
    </nav>

    <!-- Contact Form -->
      <main id="main-content" class="main-content">
        <section class="contact-container">
          <h1>Contact</h1>

          <form id="contact-form" class="contact-form" novalidate> <!--add novalidate to let JavaScript handle the validation-->
            
            <label for="name">Name:</label>
            <input id="name" type="text" required>
            
            <label for="email">Email Address:</label>
            <input id="email" type="email" required>
            
            <label for="phone">Phone:</label>
            <input id="phone" type="tel" required>
            
            <label for="date">Preferred Contact Date:</label>
            <input id="date" type="date" required>
            
            <label for="reason">Reason for Contact:</label>
            <select id="reason" required>
              <option value="">Please select</option>
              <option value="adoption">Adoption Questions</option>
              <option value="volunteer">Volunteer Information</option>
              <option value="donation">Donation Inquiry</option>
              <option value="other">Other</option>
            </select>
          
            <label for="message">Message:</label>
            <textarea id="message"></textarea>
            
            <!-- Submit -->
            <button type="submit" class="submit-btn">Send</button>

          </form>
        </section>
      </main>

      <!--Footer-->
      <footer class="footer-container">
        <img src="images/adoptadog-logo.svg" alt="Adoptadog logo" class="logo-img">

          <ul class="footer-nav-ul">
            <li><a class="footer-nav-a" href="index.html">Home</a></li>
            <li><a class="footer-nav-a" href="dogs.html">Dogs</a></li>
            <li><a class="footer-nav-a" href="blog.html">Blog</a></li>
          </ul>
        </nav>
        <p class="footer-copyright"> &copy; 2018 Adoptadog,LLC  |  Seattle, WA</p>
      </footer>
      <script src="contact.js"></script>
  </body>
</html>
